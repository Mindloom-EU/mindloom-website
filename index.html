<!DOCTYPE html>
<html lang="nl">
<head>
  <!-- …your existing head… -->
  <style>
    /* …all your existing styles… */

    /* Zoho form overrides */
    .newsletter .quick_form_9_css {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .newsletter .quick_form_9_css .SIGNUP_FLD input[type="text"] {
      flex: 1;
      min-width: 250px;
      padding: 15px 20px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
    }
    .newsletter .quick_form_9_css .SIGNUP_FLD input[type="submit"] {
      padding: 15px 30px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 150px;
    }
    .newsletter .quick_form_9_css .SIGNUP_FLD input[type="submit"]:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    /* Hide Zoho’s default headings if you want to keep yours */
    #SIGNUP_HEADING { display: none; }
  </style>
</head>
<body>
  <!-- …all your existing sections… -->

  <section class="newsletter">
    <div class="container">
      <h2>Prism komt eraan</h2>
      <p>Wees de eerste die hoort wanneer Prism beschikbaar is en ontvang exclusieve updates over onze ontwikkeling.</p>

      <!-- Zoho snippet starts -->
      <!--Zoho Campaigns Web-Optin Form Starts Here-->
      <div id="customForm">
        <div class="quick_form_9_css" name="SIGNUP_BODY">

          <!-- Success message container -->
          <div style="position:relative;">
            <div id="Zc_SignupSuccess" style="display:none; position:absolute; margin-left:4%; width:90%; background-color:white; padding:3px; border:3px solid rgb(194,225,154); margin-top:10px; word-break:break-all;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td width="10%">
                    <img class="successicon" src="https://zcv2-zcmp.maillist-manage.eu/images/challangeiconenable.jpg" align="absmiddle">
                  </td>
                  <td>
                    <span id="signupSuccessMsg" style="color: rgb(73,140,132); font-family:sans-serif; font-size:14px;">
                      &nbsp;&nbsp;Bedankt voor je aanmelding!
                    </span>
                  </td>
                </tr>
              </table>
            </div>
          </div>

          <form method="POST" id="zcampaignOptinForm"
                action="https://zcv2-zcmp.maillist-manage.eu/weboptin.zc"
                target="_zcSignup"
                onsubmit="zcScptlessSubmit(this)">
            
            <div id="errorMsgDiv" style="display:none; font-size:0.9rem; color:#e74c3c; margin-bottom:10px;">
              Corrigeer alsjeblieft de gemarkeerde velden.
            </div>

            <div class="SIGNUP_FLD">
              <input type="text"
                     placeholder="Je e-mailadres"
                     changeitem="SIGNUP_FORM_FIELD"
                     name="CONTACT_EMAIL"
                     id="EMBED_FORM_EMAIL_LABEL"
                     required>
            </div>

            <div class="SIGNUP_FLD">
              <input type="submit"
                     name="SIGNUP_SUBMIT_BUTTON"
                     id="zcWebOptin"
                     value="Houd me op de hoogte">
            </div>

            <!-- Zoho hidden fields… -->
            <input type="hidden" name="zx" value="14ae7a5b7a">
            <input type="hidden" name="zcvers" value="2.0">
            <!-- (all the other hidden inputs you had…) -->

          </form>
        </div>
      </div>
      <!--Zoho Campaigns Web-Optin Form Ends Here-->
      <!-- Zoho snippet ends -->

      <p style="font-size:0.9rem; margin-top:20px; opacity:0.8;">
        We respecteren je privacy. Geen spam, alleen belangrijke updates.
      </p>
    </div>
  </section>

  <!-- …footer, scripts… -->

  <script>
    function zcScptlessSubmit(parentNode) {
      if (parentNode.querySelector("#zc_spmSubmit")) {
        parentNode.querySelector("#zc_spmSubmit").remove();
      }
      parentNode.submit();
    }
    // keep your smooth-scroll script if you need it
  </script>
</body>
</html>
